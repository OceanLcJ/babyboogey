name = "babyboogey"
main = "custom-worker.ts"
workers_dev = true
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat", "nodejs_compat_populate_process_env"]

[assets]
binding = "ASSETS"
directory = ".open-next/assets"

[[d1_databases]]
binding = "DB"
database_name = "babyboogey-db"
database_id = "400a1494-f1dd-41fc-86d4-81c4c51e3948"
migrations_dir = "src/config/db/migrations-d1"

[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "babyboogey-cache"

[observability]
enabled = true

[vars]
# app
NEXT_PUBLIC_APP_URL = "https://www.babyboogey.com"
AUTH_URL = "https://www.babyboogey.com"
AUTH_TRUSTED_ORIGINS = "https://www.babyboogey.com,https://babyboogey.com,https://babyboogey.21131911496283.workers.dev"
NEXT_PUBLIC_APP_NAME = "AI Baby Dance Generator"
EMAIL_FROM_ADDRESS = "support@babyboogey.com"
EMAIL_FROM_NAME = "BabyBoogey"
EMAIL_REPLY_TO = "support@babyboogey.com"
PAYMENT_ALERT_EMAIL = "2113191149@qq.com"

# theme
NEXT_PUBLIC_THEME = "default"

# appearance
NEXT_PUBLIC_APPEARANCE = "system"

# logo
NEXT_PUBLIC_APP_LOGO = "/logo.png"
NEXT_PUBLIC_APP_PREVIEW_IMAGE = "https://r2.babyboogey.com/assets/imgs/preview.webp"

# database
DATABASE_PROVIDER = "d1"
DB_SINGLETON_ENABLED = "true"
DB_MAX_CONNECTIONS = "1"

# auth: use the shared D1 rate_limit table for globally-consistent rate limiting
# (requires the 0004_rate_limit migration, already applied)
AUTH_RATE_LIMIT_STORAGE = "database"

[[send_email]]
name = "EMAIL"
remote = true
allowed_sender_addresses = ["support@babyboogey.com"]

[triggers]
crons = ["0 * * * *"]
